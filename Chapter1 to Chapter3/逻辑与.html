<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>&& 逻辑与</h1>
    <div>
      记住这个很重要!!!: 果第一个值为true的时候它是会返回第二个值,
      <strong>但是还是会检测第二个值</strong> , 是否为true
    </div>
    <code>
      <pre>
        console.log(4 && 7);  //7
        console.log(4 || 7);

      console.log(Infinity / 0);         

      console.log(6 - "a");

      console.log(false);
      </pre>
    </code>
    <script>
      // 如果第一个值为true的时候它是会返回第二个值, 但是还是会检测第二个值, 是否为true
      console.log(4 && 7);
      console.log(4 || 7);

      console.log(Infinity / 0);

      console.log(6 - "a");

      console.log(false);
    </script>
  </body>
</html>
